<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Background
  ctx.fillStyle = '#1a1608';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.2);
  ctx.fill();
  // Gold circle
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = s * 0.04;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s * 0.3, 0, Math.PI * 2);
  ctx.stroke();
  // PT text
  ctx.fillStyle = '#c8a84b';
  ctx.font = `bold ${s * 0.3}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PT', s/2, s/2);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Download links
['c192','c512'].forEach(id => {
  const canvas = document.getElementById(id);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `icon-${canvas.width}.png`;
  a.textContent = `Download ${canvas.width}px`;
  a.style.display = 'block';
  a.style.margin = '10px';
  document.body.appendChild(a);
});
</script>
</body>
</html>
